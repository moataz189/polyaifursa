[SERVICE]
    Flush         5
    Log_Level     info

[INPUT]
    Name          tail
    Tag           docker.*
    Path          /var/lib/docker/containers/*/*-json.log
    Parser        docker
    DB            /var/log/flb_docker.db
    Mem_Buf_Limit 5MB
    Skip_Long_Lines On

[FILTER]
    Name          record_modifier
    Match         docker.*
    Record        host ${HOSTNAME}

[OUTPUT]

    Match             docker.*
    bucket            moataz-polyai-logs-dev
    region            us-east-1
    s3_key_format     /logs/%Y/%m/%d/$TAG[1]_%H%M%S.gz
    compression       gzip
    upload_timeout    60s
    use_put_object    On
    total_file_size   1M