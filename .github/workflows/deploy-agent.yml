name: Deploy Agent

on:
  push:
    branches:
      - dev
      - main
    paths:
      - "services/agent/**"
      - ".github/workflows/deploy-agent.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: services/agent
          push: true
          tags: moataz189/agent-service:${{ github.sha }}

    deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy agent
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ github.ref == 'refs/heads/main' && secrets.PROD_INSTANCE_HOST || secrets.DEV_INSTANCE_HOST }}
          username: ubuntu
          key: ${{ github.ref == 'refs/heads/main' && secrets.PROD_INSTANCE_SSH_KEY || secrets.DEV_INSTANCE_SSH_KEY }}
          script: |
            cd ~

            if [ ! -d polyaifursa ]; then
              git clone https://github.com/moataz189/polyaifursa.git
            fi

            cd polyaifursa
            git fetch origin
            git checkout ${GITHUB_REF_NAME}
            git pull origin ${GITHUB_REF_NAME}

            cd services

            sed -i "s/^AGENT_IMAGE_TAG=.*/AGENT_IMAGE_TAG=${{ github.sha }}/" .env

            docker compose pull agent
            docker compose up -d agent