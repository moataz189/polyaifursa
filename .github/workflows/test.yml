name: Run Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r services/yolo/torch-requirements.txt
          pip install -r services/yolo/requirements.txt 

      - name: Run tests with coverage
        run: pytest tests/
        working-directory: services/yolo
      
      
   
      
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  agent-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r services/agent/requirements.txt

      - name: Run agent tests
        working-directory: services/agent
        env:
          MODEL: anthropic.claude-3-haiku-20240307-v1:0
          MODEL_PROVIDER: bedrock_converse
          AWS_REGION: us-east-1
        run: pytest tests/