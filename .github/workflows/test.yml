name: Run Tests

on:
  pull_request:
    branches:
      - main

jobs:
  yolo-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r services/yolo/torch-requirements.txt
          pip install -r services/yolo/requirements.txt 

      - name: Run tests with coverage
        run: pytest tests/
        working-directory: services/yolo
      
      
   
      
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  agent-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r services/agent/requirements.txt

      - name: Run agent tests
        working-directory: services/agent
        env:
          MODEL: openai.gpt-oss-20b-1:0
          MODEL_PROVIDER: bedrock_converse
          AWS_REGION: us-east-1
        run: pytest tests/
        
  docker-scout:
  runs-on: ubuntu-latest

  strategy:
    matrix:
      service:
        - name: yolo-service
          context: services/yolo
        - name: agent-service
          context: services/agent
        - name: frontend-service
          context: services/frontend

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build image
      uses: docker/build-push-action@v6
      with:
        context: ${{ matrix.service.context }}
        push: false
        load: true
        tags: ${{ matrix.service.name }}:ci

    - name: Docker Scout CVE scan
      uses: docker/scout-action@v1
      with:
        command: cves
        image: ${{ matrix.service.name }}:ci